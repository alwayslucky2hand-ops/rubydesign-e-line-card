<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>後台管理 | 露比設計</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #FDF2F8; -webkit-tap-highlight-color: transparent; }
    .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 所見即所得的手機外框 */
    .mockup-phone { width: 340px; height: 700px; border: 12px solid #1f2937; border-radius: 40px; overflow-y: auto; background: #fff; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); margin: 0 auto;}
    .mockup-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 24px; background: #1f2937; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; z-index: 10; }
  </style>
</head>
<body class="text-gray-800">

  <div id="app" class="min-h-screen w-full flex flex-col items-center justify-center sm:p-4">
    <div v-if="currentView === 'login'" class="w-full max-w-md p-8 sm:rounded-3xl shadow-2xl glass-panel">
        <h1 class="text-4xl font-black text-center text-pink-500 mb-6">Ruby.</h1>
        <form @submit.prevent="handleLogin" class="space-y-4">
            <input v-model="loginForm.email" type="email" placeholder="Email" class="w-full p-4 rounded-xl border">
            <input v-model="loginForm.password" type="password" placeholder="密碼" class="w-full p-4 rounded-xl border">
            <button class="w-full bg-pink-500 text-white p-4 rounded-xl font-bold">{{ isLoading ? '載入中...' : '登入' }}</button>
        </form>
    </div>

    <div v-if="currentView === 'dashboard'" class="w-full sm:max-w-6xl h-screen sm:h-[90vh] flex flex-col sm:rounded-3xl shadow-2xl bg-gray-50 overflow-hidden relative">
      
      <div class="flex justify-between items-center p-5 bg-white border-b sticky top-0 z-20">
        <h1 class="text-lg font-black">Ruby Design. <span class="text-sm font-normal text-gray-500">| {{ currentUser?.name }}</span></h1>
        <button @click="logout" class="text-red-500 font-bold"><i class="ph ph-sign-out text-xl"></i></button>
      </div>

      <div class="p-5 sm:p-8 flex-1 overflow-y-auto no-scrollbar pb-24 sm:pb-8">
        
        <div v-show="activeTab === 'profile'" class="flex flex-col lg:flex-row gap-8 justify-center items-start">
            
            <div class="mockup-phone no-scrollbar">
                <div class="mockup-notch"></div>
                <div class="pt-12 px-6 pb-10 flex flex-col items-center min-h-full" :style="{ backgroundColor: profile.bgColor }">
                    
                    <div @click="openMediaLibrary('avatar')" class="relative group cursor-pointer mt-6 mb-4">
                        <img :src="profile.avatarUrl || 'https://via.placeholder.com/150'" class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg">
                        <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <i class="ph ph-camera text-white text-2xl"></i>
                        </div>
                    </div>

                    <input v-model="profile.name" class="text-xl font-black text-center bg-transparent border-b border-transparent hover:border-gray-300 focus:border-pink-500 outline-none mb-2" placeholder="您的顯示名稱">
                    <textarea v-model="profile.bio" class="text-sm text-center text-gray-600 bg-transparent resize-none outline-none border-b border-transparent hover:border-gray-300 focus:border-pink-500 w-full" rows="2" placeholder="寫一段簡短的自我介紹..."></textarea>

                    <div class="w-full mt-6 space-y-3">
                        <div v-for="(btn, index) in buttons" :key="btn.id" 
                             class="relative w-full rounded-2xl p-1 shadow-sm transition group"
                             :style="{ backgroundColor: btn.color || '#ffffff' }">
                            
                            <button @click="deleteButton(btn.id, index)" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 shadow-md z-10">
                                <i class="ph ph-x"></i>
                            </button>

                            <div class="flex items-center gap-3 px-2 py-2">
                                <div @click="openMediaLibrary('buttonIcon', index)" class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center cursor-pointer overflow-hidden border border-gray-200">
                                    <img v-if="btn.iconUrl" :src="btn.iconUrl" class="w-full h-full object-cover">
                                    <i v-else class="ph ph-image text-gray-400"></i>
                                </div>
                                <input v-model="btn.title" class="flex-1 bg-transparent font-bold text-gray-800 outline-none placeholder-gray-400" placeholder="按鈕文字">
                                <input type="color" v-model="btn.color" class="w-6 h-6 rounded cursor-pointer border-0 bg-transparent">
                            </div>
                        </div>

                        <button @click="addNewButton" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-2xl text-gray-500 font-bold hover:bg-gray-50 transition flex justify-center items-center gap-2">
                            <i class="ph ph-plus-circle text-xl"></i> 新增連結按鈕
                        </button>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-80 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="font-black text-lg mb-4 text-gray-800">全域視覺設定</h3>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-600 mb-2">背景顏色</label>
                    <input type="color" v-model="profile.bgColor" class="w-full h-10 rounded cursor-pointer">
                </div>
                <button @click="saveProfileData" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-black transition flex justify-center items-center gap-2">
                    <i v-if="isSaving" class="ph ph-spinner animate-spin"></i>
                    {{ isSaving ? '儲存同步中...' : '儲存變更至前台' }}
                </button>
            </div>
        </div>

        <div v-show="activeTab === 'line'">
            <div class="bg-white p-6 rounded-2xl shadow-sm text-center">
                <h2 class="font-bold mb-4">LINE 輪播圖文管理</h2>
                <button @click="openMediaLibrary('slide')" class="w-full py-8 border-2 border-dashed border-purple-300 rounded-xl bg-purple-50 text-purple-600 font-bold">
                  開啟圖庫上傳 / 選擇輪播圖片
                </button>
            </div>
        </div>

      </div>

      <div class="fixed sm:absolute bottom-0 w-full bg-white border-t flex justify-around p-2 z-30">
        <button @click="activeTab = 'profile'" :class="activeTab === 'profile' ? 'text-pink-600' : 'text-gray-400'" class="flex flex-col items-center p-2 font-bold text-sm"><i class="ph-fill ph-device-mobile text-2xl"></i> Profile設計</button>
        <button @click="activeTab = 'line'" :class="activeTab === 'line' ? 'text-purple-600' : 'text-gray-400'" class="flex flex-col items-center p-2 font-bold text-sm"><i class="ph-fill ph-cards text-2xl"></i> LINE輪播</button>
      </div>

    </div>

    <div v-if="isMediaModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[80vh]">
            
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h2 class="font-black text-lg flex items-center gap-2"><i class="ph-fill ph-folder-open text-pink-500"></i> 您的雲端圖庫</h2>
                <button @click="isMediaModalOpen = false" class="text-gray-400 hover:text-red-500 bg-white p-2 rounded-full shadow-sm"><i class="ph ph-x text-lg"></i></button>
            </div>

            <div class="p-5 flex-1 overflow-y-auto bg-gray-100">
                <div class="mb-6 flex gap-3">
                    <input type="file" ref="fileInput" @change="handleFileSelect" accept="image/*" class="hidden">
                    <button @click="$refs.fileInput.click()" class="flex-1 bg-white border border-gray-200 text-gray-700 font-bold py-3 rounded-xl shadow-sm hover:border-pink-500 flex justify-center items-center gap-2">
                        <i class="ph ph-upload-simple"></i> 選擇電腦/手機照片
                    </button>
                    <button v-if="selectedFile" @click="uploadImageToDrive" :disabled="isUploading" class="flex-1 bg-pink-500 text-white font-bold py-3 rounded-xl shadow-md disabled:opacity-50">
                        {{ isUploading ? '高畫質上傳中...' : '確認上傳' }}
                    </button>
                </div>

                <div v-if="previewImage" class="mb-6 p-2 bg-white rounded-xl shadow-sm border border-pink-200 flex items-center gap-4">
                    <img :src="previewImage" class="w-16 h-16 object-cover rounded-lg">
                    <span class="font-bold text-sm text-pink-600">準備上傳中...</span>
                </div>

                <h3 class="font-bold text-gray-500 text-sm mb-3">已上傳的圖片歷史 (點擊選擇)</h3>
                
                <div v-if="isLoadingImages" class="text-center py-10 text-gray-400 animate-pulse">載入圖庫中...</div>
                
                <div v-else class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                    <div v-for="img in mediaImages" :key="img.id" @click="selectImage(img.url)" class="aspect-square bg-white rounded-xl border-2 border-transparent hover:border-pink-500 cursor-pointer overflow-hidden shadow-sm group relative">
                        <img :src="img.url" class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                            <span class="bg-white text-gray-900 text-xs font-bold px-2 py-1 rounded-full">選擇</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const currentView = ref('login'); 
        const activeTab = ref('profile'); 
        const currentUser = ref(null);
        const loginForm = ref({ email: '', password: '' });
        
        const isLoading = ref(false);
        const isSaving = ref(false);

        // API 網址
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzFIevyKloCU9wbGMUdAES-BKIr9KxXVUZgfIfRJmrWlZnBR6QuE9kIcESvbATzW0t4bw/exec';

        // 🌟 WYSIWYG Profile 狀態
        const profile = ref({
            avatarUrl: '',
            name: '',
            bio: '',
            bgColor: '#FDF2F8'
        });
        const buttons = ref([]);

        // 🌟 Media Library 狀態
        const isMediaModalOpen = ref(false);
        const mediaImages = ref([]);
        const isLoadingImages = ref(false);
        const currentUploadContext = ref(''); // 'avatar', 'buttonIcon', 'slide'
        const currentButtonIndex = ref(null);

        const selectedFile = ref(null);
        const previewImage = ref(null);
        const isUploading = ref(false);

        const apiCall = async (payload) => {
          const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
          return await res.json();
        };

        const handleLogin = async () => {
            isLoading.value = true;
            try {
                const res = await apiCall({ action: 'login', ...loginForm.value });
                if(res.status === 'success') {
                    currentUser.value = res.data;
                    currentView.value = 'dashboard';
                    // (實務上這裡會呼叫 API 抓取現有的 Profile 與 按鈕)
                } else alert('登入失敗');
            } finally { isLoading.value = false; }
        };

        const logout = () => { currentView.value = 'login'; currentUser.value = null; };

        // ==== WYSIWYG 互動邏輯 ====
        const addNewButton = () => {
            buttons.value.push({ id: Date.now().toString(), title: '新按鈕', url: '', color: '#ffffff', iconUrl: '' });
        };
        const deleteButton = (id, index) => { buttons.value.splice(index, 1); };
        
        const saveProfileData = async () => {
            isSaving.value = true;
            // 💡 這裡會發送 API 給 GAS 將 profile 與 buttons 陣列寫入 Sheet
            setTimeout(() => { alert('已同步至前台網頁！'); isSaving.value = false; }, 1000);
        };

        // ==== 圖庫 (Media Library) 邏輯 ====
        const openMediaLibrary = async (context, btnIndex = null) => {
            currentUploadContext.value = context;
            currentButtonIndex.value = btnIndex;
            isMediaModalOpen.value = true;
            
            // 判斷要讀取哪個子資料夾的圖片
            const targetFolderId = context === 'slide' ? currentUser.value.slideFolderId : currentUser.value.profileFolderId;
            
            isLoadingImages.value = true;
            try {
                const res = await apiCall({ action: 'getImages', folderId: targetFolderId });
                if(res.status === 'success') mediaImages.value = res.data;
            } catch (e) { console.error('讀取圖庫失敗'); }
            finally { isLoadingImages.value = false; }
        };

        const handleFileSelect = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile.value = file;
            previewImage.value = URL.createObjectURL(file);
        };

        // 真實上傳高畫質圖片至對應子資料夾
        const uploadImageToDrive = () => {
          if(!selectedFile.value) return;
          isUploading.value = true;
          
          const targetFolderId = currentUploadContext.value === 'slide' ? currentUser.value.slideFolderId : currentUser.value.profileFolderId;

          const reader = new FileReader();
          reader.onload = async (e) => {
            const dataUrl = e.target.result;
            const mimeType = dataUrl.split(';')[0].split(':')[1];
            const base64Str = dataUrl.split(',')[1];
            const extension = selectedFile.value.name.split('.').pop();

            try {
              const result = await apiCall({
                action: 'uploadImage',
                memberId: currentUser.value.memberId,
                email: currentUser.value.email,
                name: currentUser.value.name,
                targetFolderId: targetFolderId,
                fileBase64: base64Str,
                mimeType: mimeType,
                extension: extension
              });
              if(result.status === 'success') {
                // 上傳成功，將新圖加入圖庫清單
                mediaImages.value.unshift({ id: result.id, url: result.fileUrl, name: result.name });
                previewImage.value = null; selectedFile.value = null;
                // 自動套用該圖片
                selectImage(result.fileUrl);
              }
            } catch (err) { alert('上傳失敗'); }
            finally { isUploading.value = false; }
          };
          reader.readAsDataURL(selectedFile.value);
        };

        // 將圖庫選擇的圖片應用到對應的位置 (WYSIWYG)
        const selectImage = (url) => {
            if (currentUploadContext.value === 'avatar') {
                profile.value.avatarUrl = url;
            } else if (currentUploadContext.value === 'buttonIcon') {
                buttons.value[currentButtonIndex.value].iconUrl = url;
            } else if (currentUploadContext.value === 'slide') {
                alert('已選擇輪播圖片：' + url); // 輪播邏輯可後續擴充
            }
            isMediaModalOpen.value = false; // 關閉視窗
        };

        return { 
          currentView, activeTab, currentUser, loginForm, isLoading, isSaving, handleLogin, logout,
          profile, buttons, addNewButton, deleteButton, saveProfileData,
          isMediaModalOpen, mediaImages, isLoadingImages, openMediaLibrary, selectImage,
          handleFileSelect, uploadImageToDrive, selectedFile, previewImage, isUploading
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
